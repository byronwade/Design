name: Production install smoke

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  install-from-github:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      STATUS_SHA: ${{ github.sha }}
      STATUS_CONTEXT: design-contract/production-install/${{ matrix.os }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Report production install pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              description: 'Exact-main installation test is running',
              target_url: process.env.RUN_URL
            })
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact main commit into a clean project
        run: node ./scripts/production-smoke.mjs
        env:
          GITHUB_SHA: ${{ github.sha }}
      - name: Report production install success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              state: 'success',
              context: process.env.STATUS_CONTEXT,
              description: 'Exact-main package installed and executed successfully',
              target_url: process.env.RUN_URL
            })
      - name: Report production install failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              state: 'failure',
              context: process.env.STATUS_CONTEXT,
              description: 'Exact-main package installation failed',
              target_url: process.env.RUN_URL
            })
