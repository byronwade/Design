name: Validate design contract

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      STATUS_CONTEXT: design-contract/validate/${{ matrix.os }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Report validation pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              description: 'Design-contract validation is running',
              target_url: process.env.RUN_URL
            })
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - name: Strict contract and Google DESIGN.md validation
        run: node ./bin/design-contract.mjs validate --package --require-google --json > validation-report.json
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ matrix.os }}
          path: validation-report.json
          if-no-files-found: error
      - name: Compiler, migration, adapter, and safety tests
        run: npm test
      - name: Build package index
        run: npm run build
      - name: Pack, install, and execute the public package shape
        run: npm run smoke
      - name: Run release component-fidelity benchmark
        run: npm run benchmark:release
      - name: Build and audit the official Astro reference site
        run: npm run site:check
      - name: Report validation success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              state: 'success',
              context: process.env.STATUS_CONTEXT,
              description: 'Validation, tests, build, and package smoke passed',
              target_url: process.env.RUN_URL
            })
      - name: Report validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              state: 'failure',
              context: process.env.STATUS_CONTEXT,
              description: 'Design-contract validation failed',
              target_url: process.env.RUN_URL
            })
