name: Validate design contract

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - name: Strict contract and Google DESIGN.md validation
        run: npm run validate:strict
      - name: Compiler, migration, adapter, and safety tests
        run: npm test
      - name: Build package index
        run: npm run build
      - name: Pack, install, and execute the public package shape
        run: npm run smoke
